<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fi-Go</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --accent: #00ffcc;
      --accent-dim: #00ccaa;
      --bg: #1a1a1a;
      --bg-panel: #242424;
      --bg-input: #2e2e2e;
      --border: #383838;
      --text: #f0f0f0;
      --text-muted: #888;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      background: #111;
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .logo .go {
      color: var(--accent);
      text-shadow: 0 0 10px #00ffcc99, 0 0 20px #00ffcc44;
    }

    /* ── MAIN LAYOUT ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── FORM PANEL (left) ── */
    .form-panel {
      width: 40%;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 1.1rem;
      padding: 2rem;
      border-right: 1px solid var(--border);
      background: var(--bg-panel);
    }

    .form-panel label {
      width: 100%;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: -0.5rem;
    }

    select,
    textarea {
      width: 100%;
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    select {
      padding: 0.65rem 0.9rem;
      height: 2.7rem;
      cursor: pointer;
    }

    textarea {
      padding: 0.8rem 0.9rem;
      height: 9rem;
      resize: vertical;
    }

    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px #00ffcc22;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0.7rem 1.4rem;
      border-radius: 8px;
      border: none;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #000;
    }

    .btn-primary:hover {
      background: var(--accent-dim);
    }

    .btn-ghost {
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── RESULT PANEL (right) ── */
    .result-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .result-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: #1e1e1e;
      flex-shrink: 0;
    }

    .result-toolbar span {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .toolbar-actions {
      display: flex;
      gap: 0.5rem;
    }

    #result {
      flex: 1;
      overflow: auto;
      padding: 1.5rem;
      background: var(--bg);
    }

    #result pre {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      line-height: 1.4;
      white-space: pre;
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      body {
        overflow: auto;
      }

      .layout {
        flex-direction: column;
        overflow: visible;
      }

      .form-panel {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .result-panel {
        min-height: 50vh;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1 class="logo">Fi-<span class="go">GO</span> web</h1>
  </header>

  <div class="layout">

    <!-- ── LEFT: Form ── -->
    <div class="form-panel">
      <form action="/asciiart" method="POST" style="width:100%;display:flex;flex-direction:column;gap:1.1rem;">
        <label for="font">Font</label>
        <select name="fonts" id="font">
          <option value="" disabled {{if eq .Banner ""}}selected{{end}}>Select a font</option>
          <option value="standard"   {{if eq .Banner "standard"}}selected{{end}}>Standard</option>
          <option value="thinkertoy" {{if eq .Banner "thinkertoy"}}selected{{end}}>Thinkertoy</option>
          <option value="shadow"     {{if eq .Banner "shadow"}}selected{{end}}>Shadow</option>
        
        </select>

        <label for="passed-text">Text</label>
        <textarea name="passed-text" id="passed-text" placeholder="Type your text here…">{{.Text}}</textarea>

        <button class="btn btn-primary" type="submit">Generate ASCII Art</button>
      </form>
    </div>

    <!-- ── RIGHT: Result ── -->
    <div class="result-panel">
      <div class="result-toolbar">
        <span>Output</span>
        <div class="toolbar-actions">
          <button class="btn btn-ghost" type="button" onclick="copyResult()">Copy</button>
          <button class="btn btn-ghost" type="button" onclick="downloadResult()">Download</button>
        </div>
      </div>
      <div id="result">
        <pre>{{.Result}}</pre>
      </div>
    </div>

  </div>

  <script>
    function copyResult() {
      const text = document.querySelector("#result pre").innerText;
      navigator.clipboard.writeText(text)
        .then(() => alert("Copied to clipboard!"))
        .catch(() => alert("Failed to copy."));
    }

    function downloadResult() {
      const text = document.querySelector("#result pre").innerText;
      const blob = new Blob([text], { type: "text/plain" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "ascii-art.txt";
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>

</body>
</html>
